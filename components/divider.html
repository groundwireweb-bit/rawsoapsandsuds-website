<!-- ==========================================================================
     Section divider component — Raw Soaps and Suds
     Built by Agent 05. Styles live in globals/styles.css (.divider + modifiers).

     Full-width rule:   .divider           (1px border-colored line)
     Accent rule:       .divider--accent   (short kraft-tan bar, marks breaks)
     Centering:         .divider--center   (centers the accent rule)

     Use <hr> so the divider is semantic. The accent bar is the quiet, on-brand
     way to separate sections without a heavy line.
     ========================================================================== -->

<!-- Full-width neutral divider -->
<hr class="divider" />

<!-- Short kraft-tan accent bar, left-aligned (e.g. under a section heading) -->
<hr class="divider divider--accent" />

<!-- Short kraft-tan accent bar, centered -->
<hr class="divider divider--accent divider--center" />

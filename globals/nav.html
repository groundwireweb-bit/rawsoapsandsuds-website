<!-- ==========================================================================
     Raw Soaps & Suds — Navigation
     Shared across every page.

     Usage:
       - Each page must include globals/styles.css for this to render.
       - Set the current page on <body> so the active link highlights, e.g.:
           <body data-page="home">   (home | shop | ingredients | request)
       - Sticky behavior comes from .site-nav (position: sticky in styles.css).
     ========================================================================== -->
<nav class="site-nav" aria-label="Primary">
  <div class="site-nav__inner">
    <!-- Brand: the stamped badge (assets/logo-mark.svg) paired with the text
         wordmark. alt="" because the wordmark span and the link's aria-label
         already name the business; onerror hides the mark and leaves the
         wordmark if the SVG ever fails to load. -->
    <a class="site-nav__brand" href="index.html" aria-label="Raw Soaps and Suds, home">
      <img class="site-nav__logo" src="assets/logo-mark.svg" alt="" width="40" height="40" onerror="this.style.display='none'">
      <span class="site-nav__wordmark">Raw Soaps &amp; Suds</span>
    </a>

    <!-- Hamburger toggle: visible on mobile only (CSS). Vanilla JS below. -->
    <button class="site-nav__toggle" type="button" aria-expanded="false" aria-controls="site-nav-menu" aria-label="Open menu">
      <span class="site-nav__toggle-bar"></span><span class="site-nav__toggle-bar"></span><span class="site-nav__toggle-bar"></span>
    </button>

    <!-- Menu: horizontal on desktop, collapses behind the toggle on mobile. -->
    <div class="site-nav__menu" id="site-nav-menu">
      <ul class="site-nav__links">
        <li><a class="site-nav__link" href="index.html" data-nav="home">Home</a></li>
        <li><a class="site-nav__link" href="shop.html" data-nav="shop">The Bars</a></li>
        <li><a class="site-nav__link" href="ingredients-allergens.html" data-nav="ingredients">What's In 'Em</a></li>
        <li><a class="site-nav__link" href="request.html" data-nav="request">Order</a></li>
      </ul>
      <a class="btn btn--primary site-nav__cta" href="request.html">Holler at Jelisha</a>
    </div>
  </div>
</nav>
<script>
  (function () {
    'use strict';
    var nav = document.querySelector('.site-nav');
    if (!nav) return;
    var toggle = nav.querySelector('.site-nav__toggle');
    var menu = nav.querySelector('.site-nav__menu');
    function setMenu(open) {
      menu.setAttribute('data-open', open ? 'true' : 'false');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    }
    if (toggle && menu) {
      toggle.addEventListener('click', function () { setMenu(toggle.getAttribute('aria-expanded') !== 'true'); });
      menu.addEventListener('click', function (e) { if (e.target.closest('a')) setMenu(false); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && toggle.getAttribute('aria-expanded') === 'true') { setMenu(false); toggle.focus(); }
      });
    }
    var current = document.body.getAttribute('data-page');
    if (current) {
      var active = nav.querySelector('.site-nav__link[data-nav="' + current + '"]');
      if (active) active.setAttribute('aria-current', 'page');
    }
  })();
</script>
